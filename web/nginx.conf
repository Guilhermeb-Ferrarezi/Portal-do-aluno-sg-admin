map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 550M;

  # Docker DNS: resolve o service name em runtime e evita falha de boot
  # quando o hostname do api ainda nao estiver disponivel na subida do nginx.
  resolver 127.0.0.11 ipv6=off valid=30s;
  resolver_timeout 5s;
  set $api_upstream http://api:3000;

  root /usr/share/nginx/html;
  index index.html;

  # ===== SPA: qualquer rota cai no index.html =====
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ===== PROXY para API =====
  location /api/ {
    client_max_body_size 550M;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_socket_keepalive on;
    proxy_next_upstream off;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # ===== PROXY para WebSocket de presenca =====
  location /ws/ {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_socket_keepalive on;
    proxy_next_upstream off;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # ===== Cache de assets (30 dias) =====
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # ===== Health check =====
  location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }
}
