version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
      radix:
        patterns:
          - "@radix-ui/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      framer:
        patterns:
          - "framer-motion"

  - package-ecosystem: npm
    directory: /api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      express:
        patterns:
          - "express"
          - "@types/express"

  - package-ecosystem: npm
    directory: /electron
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
